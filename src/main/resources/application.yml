spring:
  application:
    name: shoptracker

  datasource:
    url: jdbc:postgresql://localhost:5432/shoptracker
    username: shoptracker
    password: shoptracker123

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

server:
  port: 8080

logging:
  level:
    com.shoptracker: DEBUG
    org.springframework.modulith: DEBUG
